parameters: { }

services:
    _defaults:
        autowire: true
        autoconfigure: true

    # -> auto-discovery dla całego src (wykluczamy Kernel)
    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    App\Infrastructure\Http\Controller\:
        resource: '../src/Infrastructure/Http/Controller/'
        tags: ['controller.service_arguments']
        # public: true   # (niekonieczne, tag wystarczy)

    # Infrastructure bindings
#    App\Application\Ports\GameRepository: '@App\Infrastructure\Persistence\Doctrine\DoctrineGameRepository'
    App\Domain\Game\GameRepository: '@App\Infrastructure\Persistence\Doctrine\DoctrineGameRepository'

    # Domain ports
    App\Domain\Game\FleetGenerator: '@App\Domain\Game\RandomFleetGenerator'
    App\Application\Game\WeaponUseDecider: '@App\Application\Game\RandomWeaponUseDecider'

# Testy funkcjonalne wymagają przewidywalnej floty przeciwnika i tury AI
when@test:
    services:
        App\Domain\Game\FleetGenerator: '@App\Domain\Game\DeterministicFleetGenerator'
        App\Application\Game\WeaponUseDecider: '@App\Application\Game\NeverUseWeaponsDecider'
