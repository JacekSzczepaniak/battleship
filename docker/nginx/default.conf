server {
    listen 80;
    server_name statki.local;

    root /var/www/html/public;
    index index.php;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Obsługa preflight CORS dla API już na poziomie Nginx (dev)
    location /api/ {
        # Dodaj nagłówki CORS dla WSZYSTKICH odpowiedzi pod /api/
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '$http_access_control_request_headers' always;
        add_header 'Access-Control-Expose-Headers' 'Link' always;
        add_header 'Vary' 'Origin' always;

        if ($request_method = OPTIONS) {
            return 204;
        }
        try_files $uri /index.php$is_args$args;
    }

    # Pozostałe ścieżki
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 180;
    }

    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }
}
